description = """
Full pipeline from vague idea to approved, beads-ready implementation plan.

Start by describing your idea conversationally to your agent.
They'll pour this formula and it takes over from there.

## Pipeline
[intake]            Agent structures idea into a draft PRD
      ↓
[prd-review]        6 parallel PRD reviewers → prd-review.synthesize
      ↓
[human-clarify]     Agent presents consolidated questions, you answer
      ↓
[generate-plan]     6 parallel design dimensions → generate-plan.synthesize
      ↓
[prd-align]         6 parallel PRD alignment checks → prd-align.consolidate
      ↓
[plan-review]       6 parallel plan self-reviews → plan-review.consolidate
      ↓
[create-beads]      Agent converts the refined plan into beads with dependencies
      ↓
[verify-beads]      3 sequential passes comparing plan to beads
      ↓
[formula-feedback]  3 parallel analysts → consolidate into proposed formula edits

## Human Gate
There is one human gate:
1. **After PRD review**: You answer clarifying questions before plan generation
"""
formula = "idea-to-plan"
type = "workflow"
version = 2

[vars]
[vars.review_id]
description = "Short slug for the review (e.g. notification-levels) — computed by the agent"
required = false
default = ""

[vars.problem]
description = "Your idea, feature, or problem statement"
required = true

[vars.context]
description = "Additional context: constraints, related code, prior decisions, linked beads"
required = false
default = ""

[[steps]]
id = "intake"
title = "Structure idea into draft PRD"
description = """
Read the conversation context and produce a structured PRD draft.

**Your input:**
- The `{{problem}}` variable (human's raw idea description)
- Any prior conversation context (messages, notes, sketches)
- `{{context}}`

**Your task:**
Pick a short slug for this review (e.g., "notification-levels", "merge-queue-v2") and use it
as `{{review_id}}` in all paths below. This ID is reused by downstream steps.

Write a structured PRD draft to `.prd-reviews/{{review_id}}/prd-draft.md`

Use this structure:
```markdown
# PRD: <feature name>

## Problem Statement
(What problem are we solving? For whom? Why now?)

## Goals
(What success looks like — specific, measurable where possible)

## Non-Goals
(Explicitly out of scope — prevents scope creep)

## User Stories / Scenarios
(How will this be used? Who are the actors?)

## Constraints
(Technical, business, timeline, or resource constraints)

## Open Questions
(Things you already know are unknown — the review will find more)

## Rough Approach
(Initial thinking on how to solve this — not a plan, just direction)
```

Don't polish this. Breadth over depth. The review phase will find the gaps.
A draft that exposes uncertainty is more useful than one that hides it.

**After writing:**
```bash
# Store the draft path for downstream steps
echo "prd_draft=.prd-reviews/{{review_id}}/prd-draft.md" >> .prd-reviews/{{review_id}}/state.env
```

**Exit criteria:** Draft PRD file exists. Rough but readable.
"""

[[steps]]
id = "prd-review"
title = "Run parallel PRD review"
needs = ["intake"]
description = "Runs 6 parallel PRD reviews (expanded at cook time)."

[[steps]]
id = "human-clarify"
title = "Gather human clarifications on PRD"
needs = ["prd-review"]
type = "human"
description = """
Present the consolidated questions to the human and capture their answers.

This is a human gate. The molecule pauses here until you have answers.

**1. Read the synthesis report:**
```bash
cat .prd-reviews/{{review_id}}/prd-review.md
```

**2. Present the critical questions directly in conversation:**

Output the following to the human:

```
## PRD Review Complete

Full report: .prd-reviews/{{review_id}}/prd-review.md

### Overall PRD Health
<paste executive summary from synthesis>

### Questions Needing Your Input Before We Proceed
<paste the 'Before You Build: Critical Questions' section from synthesis>

---
Please reply with numbered answers matching the questions above.
I'll incorporate your answers and kick off implementation plan generation.
```

**3. Await reply:**
Wait for the human to respond in this conversation. They will type their
answers directly.

**4. Incorporate answers:**
Update the PRD draft at `.prd-reviews/{{review_id}}/prd-draft.md` with the
human's answers. Add an "Answers and Clarifications" section at the bottom:

```markdown
## Clarifications from Human Review

**Q: <question>**
A: <human's answer>
...
```

**Exit criteria:** Human has answered the critical questions. Updated PRD draft exists.
"""

[[steps]]
id = "generate-plan"
title = "Generate implementation plan"
needs = ["human-clarify"]
description = "Runs 6 parallel design dimensions (expanded at cook time)."

[[steps]]
id = "prd-align"
title = "PRD alignment review"
needs = ["generate-plan"]
description = "Runs 6 parallel PRD alignment reviews against the plan (expanded at cook time)."

[[steps]]
id = "plan-review"
title = "Plan self-review"
needs = ["prd-align"]
description = "Runs 6 parallel plan self-reviews (expanded at cook time)."

[[steps]]
id = "create-beads"
title = "Convert approved plan to beads"
needs = ["plan-review"]
description = """
Convert the refined implementation plan into beads with dependencies.

**1. Read the final plan:**
```bash
cat .designs/{{review_id}}/design-doc.md
```

**2. Identify work items from the Implementation Plan section:**

For each task/phase in the plan, create a bead:
```bash
bd create "Task title" --type=task --description="
## Context
From: {{problem}} implementation plan

## What
<task description>

## Acceptance Criteria
<how we know this is done>

## Notes
<anything relevant from the design doc>
" --json
```

**3. Set up dependencies:**

After creating all beads, wire up the dependencies based on the plan's sequencing:
```bash
bd dep add <task-x-id> <task-y-id>  # x depends on y (y blocks x)
```

**4. Create a tracking epic:**
```bash
bd create "{{problem}}" --type=epic --description="
Implementation of: {{problem}}

## Planning Artifacts
- PRD: .prd-reviews/{{review_id}}/prd-draft.md
- PRD Review: .prd-reviews/{{review_id}}/prd-review.md
- Design Doc: .designs/{{review_id}}/design-doc.md
- Review Logs: .plan-reviews/{{review_id}}/
" --json
```

**5. Output summary in conversation:**
```
## Beads Created

### Summary
<list of created beads with IDs>

### Next Steps
- Review beads: bd list --type=task
- Start work: bd ready
```

**Exit criteria:** All plan tasks exist as beads. Dependencies are correctly wired. Epic created.
"""

[[steps]]
id = "verify-beads-pass-1"
title = "Verify beads coverage against plan (pass 1)"
needs = ["create-beads"]
description = """
First pass: find gaps between the implementation plan and the beads just created.

1. Read the plan: `cat .designs/{{review_id}}/design-doc.md`
2. List all beads: `bd list --status=open`
3. Compare every plan task to the created beads.
4. If anything is missing, create it and wire dependencies.
"""

[[steps]]
id = "verify-beads-pass-2"
title = "Verify beads coverage against plan (pass 2)"
needs = ["verify-beads-pass-1"]
description = """
Second pass: re-read the plan from scratch and verify coverage again.

1. Read the plan again.
2. Check for implicit requirements (e.g., "update exports", "add tests") not explicitly called out as beads.
3. Create any remaining missing beads and wire dependencies.
"""

[[steps]]
id = "verify-beads-pass-3"
title = "Final verification pass"
needs = ["verify-beads-pass-2"]
description = """
Third and final pass: validate completeness and dependency graph integrity.

1. Verify the dependency graph with `bd ready`.
2. Spot-check 3 random beads to ensure acceptance criteria are detailed.
3. Output final summary in conversation:

```
## Beads Verified

### Coverage
- Total beads: <count>

### Dependency Graph
- Ready to start: <bd ready count>
```
"""

[[steps]]
id = "formula-feedback"
title = "Analyze pipeline run and propose formula improvements"
needs = ["verify-beads-pass-3"]
description = "Runs 3 parallel analysts across the full artifact trail, then consolidates into concrete proposed edits to the formula files (expanded at cook time)."

[compose]
[[compose.expand]]
target = "prd-review"
with = "prd-review-expand"

[[compose.expand]]
target = "generate-plan"
with = "design-expand"

[[compose.expand]]
target = "prd-align"
with = "prd-align-expand"

[[compose.expand]]
target = "plan-review"
with = "plan-review-expand"

[[compose.expand]]
target = "formula-feedback"
with = "formula-feedback-expand"
