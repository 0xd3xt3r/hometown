description = """
Expansion formula: parallel design exploration across 6 dimensions, followed by synthesis.

When applied to a target step (e.g. "generate-plan"), this expansion produces:
  {target}.api           ← interface design and developer ergonomics
  {target}.data          ← data model, storage, migrations
  {target}.ux            ← user experience and CLI/UI ergonomics
  {target}.scale         ← performance and bottlenecks at scale
  {target}.security      ← threat model and attack surface
  {target}.integration   ← how it fits the existing system
  {target}.synthesize    ← waits for all 6, produces design-doc.md

The 6 dimension steps have no internal needs — they all inherit the target
step's needs and therefore run in parallel. Only synthesize waits for all 6.
"""
formula = "design-expand"
type = "expansion"
version = 1

[[template]]
id = "{target}.api"
title = "Design: API and interface"
description = """
Analyze the interface design for this feature.

**Input:**
Read the PRD with clarifications: `.prd-reviews/{{review_id}}/prd-draft.md`
Additional context: {{context}}

**Explore:**
- Command-line interface: flags, subcommands, ergonomics
- Programmatic API: function signatures, return types
- Configuration interface: files, environment variables
- Error messages and help text
- Naming conventions and discoverability
- Consistency with existing interfaces

**Questions to answer:**
- How will users discover and learn this feature?
- What's the happy path vs edge cases?
- Does it follow existing CLI/API patterns?
- What would make this a joy to use?

**Output:**
Write your analysis to: `.designs/{{review_id}}/api.md`

Structure:
```markdown
# API & Interface Design

## Summary
(1-2 paragraph overview of this dimension)

## Analysis

### Key Considerations

### Options Explored
#### Option N: <name>
- **Description**: What is it?
- **Pros**: Benefits
- **Cons**: Drawbacks
- **Effort**: Low/Medium/High

### Recommendation
(Your recommended approach for this dimension)

## Constraints Identified

## Open Questions

## Integration Points
```

**Exit criteria:** `.designs/{{review_id}}/api.md` written.
"""

[[template]]
id = "{target}.data"
title = "Design: data model"
description = """
Analyze the data model requirements for this feature.

**Input:**
Read the PRD with clarifications: `.prd-reviews/{{review_id}}/prd-draft.md`
Additional context: {{context}}

**Explore:**
- Data structures: types, relationships, constraints
- Storage format: JSON, TOML, SQLite, in-memory
- Schema design: fields, indices, normalization
- Migration strategy: versioning, backwards compatibility
- Data lifecycle: creation, updates, deletion
- Persistence vs ephemeral considerations

**Questions to answer:**
- What data needs to persist vs be computed?
- How will the data grow over time?
- What queries/access patterns are needed?
- How do we handle schema evolution?

**Output:**
Write your analysis to: `.designs/{{review_id}}/data.md`

Use the same structure as api.md (Summary / Analysis / Constraints / Open Questions / Integration Points).

**Exit criteria:** `.designs/{{review_id}}/data.md` written.
"""

