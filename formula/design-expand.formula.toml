[[template]]
id = "{target}.synthesize"
title = "Design: synthesize into design doc"
needs = [
  "{target}.api",
  "{target}.data",
  "{target}.ux",
  "{target}.scale",
  "{target}.security",
  "{target}.integration",
]
description = """
Combine all 6 dimension analyses into a unified design document.

**Input:**
Read each dimension file:
- `.designs/{{review_id}}/api.md`
- `.designs/{{review_id}}/data.md`
- `.designs/{{review_id}}/ux.md`
- `.designs/{{review_id}}/scale.md`
- `.designs/{{review_id}}/security.md`
- `.designs/{{review_id}}/integration.md`

Also read the PRD with clarifications: `.prd-reviews/{{review_id}}/prd-draft.md`

**Your task:**
1. Read all 6 analyses
2. Identify conflicts between dimensions — flag them explicitly
3. Synthesize into a unified design with concrete implementation plan
4. Flag any decisions still needing human input

**Output:**
Write to: `.designs/{{review_id}}/design-doc.md`

Structure:
```markdown
# Design: {{problem}}

## Executive Summary
(2-3 paragraph overview of proposed design)

## Problem Statement
(Clear statement of what we're solving)

## Proposed Design

### Overview
(High-level approach)

### Key Components
(Main pieces and how they fit together)

### Interface
(CLI/API summary from api dimension)

### Data Model
(Schema summary from data dimension)

## Trade-offs and Decisions

### Decisions Made
(Key choices and rationale)

### Open Questions
(Decisions needing human input — highlight these!)

### Trade-offs
(What we're trading off and why)

## Risks and Mitigations
(From security and scale dimensions)

## Implementation Plan

### Phase 1: MVP
(Tasks, acceptance criteria)

### Phase 2: Polish
(Tasks, acceptance criteria)

### Phase 3: Future
(Deferred work)

## Appendix: Dimension Analyses
- api.md, data.md, ux.md, scale.md, security.md, integration.md
```

**After writing the file, output a brief summary in conversation:**
```
Design synthesis complete. Document at: .designs/{{review_id}}/design-doc.md
Open questions requiring human input: <count>
```

**Exit criteria:** `.designs/{{review_id}}/design-doc.md` written and covers all dimensions.
"""
